version: '3.3'

services:
  soltec_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soltec_backend
    env_file:
      - .env
    environment:
      - VIRTUAL_HOST=betel-api.tecnologiaydesarrollo.net
      - LETSENCRYPT_HOST=betel-api.tecnologiaydesarrollo.net
      - LETSENCRYPT_EMAIL=onlin1992@gmail.com
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - webnet
      - apidian_net

  soltec_frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: soltec_frontend
    environment:
      - VIRTUAL_HOST=betel.tecnologiaydesarrollo.net
      - LETSENCRYPT_HOST=betel.tecnologiaydesarrollo.net
      - LETSENCRYPT_EMAIL=onlin1992@gmail.com
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    name: proxynet
    external: true
  apidian_net:
    name: apidian_api_dian
    external: true
